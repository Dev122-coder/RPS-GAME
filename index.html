<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Rock , Paper ,Scissors Game-</h1>
            <img src="rock-paper-scissors.png" alt="">
            <div class="nav">
                <h1 class="you">You <span id="yourScore">0</span></h1>
                <h1 class="comp">Computer <span id="compScore">0</span></h1>
            </div>
        </div>


        <h2>Rock , Paper or Scissors ?</h2>
        <div class="main">
            <div class="m2">
                <P class="p1"></P>
                <P class="p2"></P>
            </div>
            <div class="m3">
                <img id="playerImg" src="images/Rock.png" alt="">
                <img id="compImg" src="images/Rock.png" alt="">
            </div>
            <div class="buttons">
                <button>Rock</button>
                <button>Paper</button>
                <button>Scissor</button>
            </div>
        </div>

        <h3 >Result :</h3>
        
        <button id="resetBtn">Reset Score</button>



    </div>
    <script src="index.js"></script>
</body>

</html>
